<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Playlist Mini-Player</title>
    <style>
        /* Grunddesign & Hintergrund */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #11111b 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Container für den Player */
        .player-container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Titel und Track-Anzeige */
        .title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .track-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff0055;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Das sichtbare Mini-Player-Fenster (16:9 Verhältnis) */
        .mini-player-wrapper {
            width: 240px;
            height: 135px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Eigene Steuerungs-Buttons */
        .controls-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ff0055;
            border-color: #ff0055;
            transform: translateY(-2px);
        }

        /* Bereich für die Badges */
        .badge-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2 class="title">Aktueller Titel</h2>
        <div id="video-title" class="track-name">Player lädt...</div>

        <div class="mini-player-wrapper">
            <div id="youtube-player"></div>
        </div>

        <div class="controls-bar">
            <button onclick="if(player) player.previousVideo()">⏮ Zurück</button>
            <button onclick="if(player) player.playVideo()">▶ Play</button>
            <button onclick="if(player) player.pauseVideo()">⏸ Pause</button>
            <button onclick="if(player) player.nextVideo()">⏭ Weiter</button>
        </div>
        
        <div class="badge-container">
            <span class="badge" style="background-color: #00b4d8;">Richtlinienkonform</span>
            <span class="badge" style="background-color: #9b5de5;">🔀 Shuffle aktiv</span>
        </div>
    </div>

    <script>
        // 1. Lädt den Code für die YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 2. Erstellt den Player
        var player;
        var shuffleTriggered = false; // Kontrollvariable, damit Shuffle nur einmal getriggert wird

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '135', 
                width: '240',  
                playerVars: {
                    'listType': 'playlist',
                    'list': 'PL6eXo8yI7UvPYmPgOJe85CCvhimAEKJb0', 
                    'loop': 1,
                    'controls': 1 
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 3. Wenn geladen, Text aktualisieren
        function onPlayerReady(event) {
            document.getElementById('video-title').innerText = "Bereit! Drücke auf Play";
        }

        // 4. Wenn ein Song startet, Titel auslesen und Shuffle erzwingen
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                
                // BEHEBUNG SHUFFLE-FEHLER:
                // Sobald die Wiedergabe startet, mischen wir die Playlist im Hintergrund durch.
                if (!shuffleTriggered) {
                    player.setShuffle(true);
                    shuffleTriggered = true;
                    
                    // Optional: Wenn du willst, dass AUCH der allererste Song direkt zufällig ist, 
                    // kannst du die nächste Zeile einkommentieren (einfach die // am Anfang löschen):
                    // player.nextVideo(); 
                }

                var videoData = player.getVideoData();
                if (videoData && videoData.title) {
                    document.getElementById('video-title').innerText = videoData.title;
                }
            }
        }
    </script>

</body>
</html>
