<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Multi-Format Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #11111b 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #e2e8f0;
            font-size: 1.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Audio Player Styling */
        audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
        }

        /* Playlist-Box */
        .playlist {
            margin-top: 20px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
        }

        .track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }

        .track:last-child {
            border-bottom: none;
        }

        .track:hover, .track.active {
            background: rgba(255, 0, 85, 0.2);
            color: #ff0055;
            border-radius: 4px;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .track-format {
            font-size: 0.75rem;
            color: #718096;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .track-duration {
            color: #a0aec0;
            font-size: 0.85rem;
        }

        .status-badge {
            display: inline-block;
            background-color: #ff0055;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <span class="status-badge">Universal-Schleife</span>
        <h2 id="current-title">Wähle eine Datei</h2>
        
        <audio id="audio-player" controls></audio>

        <div class="playlist" id="playlist-container"></div>
    </div>

    <script>
        // TRAGE HIER DEINE DATEINAMEN EIN!
        // Funktioniert jetzt mit .mp3, .mp4, .wav, .m4a, .ogg etc.
        const songs = [
            "mein_video_song.mp4",
            "klassisches_lied.mp3",
            "aufnahme.wav",
            "anderer_song.m4a"
        ];

        const player = document.getElementById('audio-player');
        const currentTitle = document.getElementById('current-title');
        const playlistContainer = document.getElementById('playlist-container');
        let currentTrackIndex = 0;

        // Hilfsfunktion, um die Dateiendung sauber zu entfernen
        function cleanFileName(filename) {
            return filename.substring(0, filename.lastIndexOf('.')).replace(/_/g, ' ');
        }

        // Hilfsfunktion, um nur das Format anzuzeigen (z.B. MP4)
        function getExtension(filename) {
            return filename.substring(filename.lastIndexOf('.') + 1);
        }

        // Playlist im UI aufbauen
        function loadPlaylist() {
            playlistContainer.innerHTML = "";
            songs.forEach((song, index) => {
                const trackDiv = document.createElement('div');
                trackDiv.className = `track ${index === currentTrackIndex ? 'active' : ''}`;
                
                const cleanName = cleanFileName(song);
                const format = getExtension(song);

                trackDiv.innerHTML = `
                    <div class="track-info">
                        <span>${index + 1}. ${cleanName}</span>
                        <span class="track-format">${format}-Audio</span>
                    </div>
                    <span class="track-duration" id="dur-${index}">Lädt...</span>
                `;

                trackDiv.onclick = () => playTrack(index);
                playlistContainer.appendChild(trackDiv);

                // Dauer ermitteln (funktioniert auch bei mp4-Audiospuren)
                const audioX = new Audio(song);
                audioX.addEventListener('loadedmetadata', () => {
                    const minutes = Math.floor(audioX.duration / 60);
                    const seconds = Math.floor(audioX.duration % 60).toString().padStart(2, '0');
                    document.getElementById(`dur-${index}`).innerText = `${minutes}:${seconds}`;
                });
            });
        }

        // Funktion um einen Track zu spielen
        function playTrack(index) {
            currentTrackIndex = index;
            player.src = songs[currentTrackIndex];
            
            currentTitle.innerText = cleanFileName(songs[currentTrackIndex]);

            // Aktiven Track hervorheben
            const tracks = document.querySelectorAll('.track');
            tracks.forEach((t, i) => {
                t.classList.toggle('active', i === currentTrackIndex);
            });

            player.play().catch(error => {
                console.log("Autoplay von Browser blockiert, bis der Nutzer interagiert.");
            });
        }

        // Am Ende des Songs -> Nächstes Lied (Dauerschleife)
        player.addEventListener('ended', () => {
            currentTrackIndex++;
            if (currentTrackIndex >= songs.length) {
                currentTrackIndex = 0;
            }
            playTrack(currentTrackIndex);
        });

        // Starten
        loadPlaylist();
        if(songs.length > 0) {
            player.src = songs[0];
            currentTitle.innerText = cleanFileName(songs[0]);
        }
    </script>

</body>
</html>
