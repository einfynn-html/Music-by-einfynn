<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Playlist Player</title>
    <style>
        /* Grunddesign & Hintergrund */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #11111b 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Container für den Audio-Player */
        .player-container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Titel und Track-Anzeige */
        .title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .track-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff0055;
            margin-bottom: 25px;
            min-height: 35px; /* Verhindert das Springen des Layouts */
        }

        /* Eigene Steuerungs-Buttons */
        .controls-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ff0055;
            border-color: #ff0055;
            transform: translateY(-2px);
        }

        .badge {
            background-color: #ff0055;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            display: inline-block;
        }

        /* Versteckt den eigentlichen YouTube-Player */
        #youtube-player {
            position: absolute;
            width: 0;
            height: 0;
            border: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2 class="title">Aktueller Song</h2>
        <div id="video-title" class="track-name">Player lädt...</div>

        <div class="controls-bar">
            <button onclick="player.previousVideo()">⏮ Zurück</button>
            <button onclick="player.playVideo()">▶ Play</button>
            <button onclick="player.pauseVideo()">⏸ Pause</button>
            <button onclick="player.nextVideo()">⏭ Weiter</button>
        </div>
        
        <span class="badge">Dauerschleife aktiv</span>
    </div>

    <div id="youtube-player"></div>

    <script>
        // 1. Lädt den Code für die YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 2. Erstellt den Player, sobald die API bereit ist
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                playerVars: {
                    'listType': 'playlist',
                    'list': 'PL6eXo8yI7UvPYmPgOJe85CCvhimAEKJb0', // Deine Playlist-ID
                    'loop': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 3. Wird aufgerufen, wenn der Player fertig geladen ist
        function onPlayerReady(event) {
            // Zeigt an, dass der Nutzer jetzt auf Play drücken kann
            document.getElementById('video-title').innerText = "Bereit! Drücke auf Play";
        }

        // 4. Wird aufgerufen, wenn sich der Status ändert (z.B. neues Video startet)
        function onPlayerStateChange(event) {
            // Wenn der Status "PLAYING" (1) ist
            if (event.data == YT.PlayerState.PLAYING) {
                // Holt die Daten des aktuellen Videos
                var videoData = player.getVideoData();
                // Schreibt den Titel in unser HTML-Element
                document.getElementById('video-title').innerText = videoData.title;
            }
        }
    </script>

</body>
</html>
